{{- if .Values.keda.enabled }}
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: coturn-allocations
  namespace: ahla-system
spec:
  scaleTargetRef:
    kind: Deployment
    name: coturn
  minReplicaCount: {{ .Values.coturn.minReplicas }}
  maxReplicaCount: {{ .Values.coturn.maxReplicas }}
  cooldownPeriod: 90
  pollingInterval: 15
  triggers:
  - type: prometheus
    metadata:
      serverAddress: {{ .Values.keda.promServer | quote }}
      metricName: turn_total_allocations
      threshold: "500"
      activationThreshold: "50"
      query: |
        sum(turn_total_allocations)
{{- end }}
