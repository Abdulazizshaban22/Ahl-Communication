global: { scrape_interval: 15s }
scrape_configs:
  - job_name: chat-api
    static_configs: [{ targets: ['chat-api:8000'] }]
  - job_name: emotion-engine
    static_configs: [{ targets: ['emotion-engine:8010'] }]
  - job_name: meet-api
    static_configs: [{ targets: ['meet-api:8020'] }]
  - job_name: drive-api
    static_configs: [{ targets: ['drive-api:8030'] }]
  - job_name: business-api
    static_configs: [{ targets: ['business-api:8040'] }]
  - job_name: mail-api
    static_configs: [{ targets: ['mail-api:8050'] }]
  - job_name: chat-ws
    metrics_path: /metrics
    static_configs: [{ targets: ['chat-ws:8080'] }]
  - job_name: meet-ws
    metrics_path: /metrics
    static_configs: [{ targets: ['meet-ws:8090'] }]
