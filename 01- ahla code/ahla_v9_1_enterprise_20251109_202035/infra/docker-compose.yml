version: "3.9"
services:
  reverse-proxy:
    image: nginx:1.27-alpine
    volumes: [ "./nginx/nginx.conf:/etc/nginx/nginx.conf:ro" ]
    ports: [ "${PUBLIC_PORT-8088}:80" ]
    depends_on: [ chat-web, meet-web, drive-web, business-web, omni-web, mail-web, chat-api, meet-api, drive-api, business-api, mail-api, chat-ws, meet-ws, keycloak, minio, coturn, loki, promtail ]

  # web apps
  chat-web: { build: ../apps/chat-web }
  meet-web: { build: ../apps/meet-web }
  drive-web: { build: ../apps/drive-web }
  business-web: { build: ../apps/business-web, environment: [ "NEXT_PUBLIC_KC_URL=${KC_URL}", "NEXT_PUBLIC_KC_REALM=${KC_REALM}", "NEXT_PUBLIC_KC_CLIENT=${KC_CLIENT}" ] }
  omni-web: { build: ../apps/omni-web, environment: [ "NEXT_PUBLIC_KC_URL=${KC_URL}", "NEXT_PUBLIC_KC_REALM=${KC_REALM}", "NEXT_PUBLIC_KC_CLIENT=${KC_CLIENT}" ] }
  mail-web: { build: ../apps/mail-web }

  # apis
  chat-api:
    build: ../services/chat-api
    environment: 
      - "REDIS_URL=${REDIS_URL}"
      - "KC_URL=${KC_URL}"
      - "KC_REALM=${KC_REALM}"
      - "KC_CLIENT=${KC_CLIENT}"
      - "ENFORCE_JWT=true"
    depends_on: [ redis, keycloak ]
    ports: [ "8000:8000" ]
  meet-api: { build: ../services/meet-api, ports: [ "8020:8020" ] }
  drive-api:
    build: ../services/drive-api
    environment:
      - "MINIO_ENDPOINT=${MINIO_ENDPOINT}"
      - "MINIO_ROOT_USER=${MINIO_ROOT_USER}"
      - "MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}"
      - "MINIO_BUCKET=${MINIO_BUCKET}"
      - "OCR_ENABLED=${OCR_ENABLED-true}"
    volumes: [ "drive_store:/data", "shared:/shared" ]
    ports: [ "8030:8030" ]
  business-api: { build: ../services/business-api, ports: [ "8040:8040" ] }
  mail-api: { build: ../services/mail-api, ports: [ "8050:8050" ] }

  # ws/signaling
  chat-ws:
    build: ../services/chat-ws
    environment: [ "WS_PORT=8080", "ENFORCE_JWT=true" ]
    ports: [ "8080:8080" ]
  meet-ws:
    build: ../services/meet-ws
    environment: [ "MEET_PORT=8090" ]
    ports: [ "8090:8090" ]

  emotion-engine:
    build: ../services/emotion-engine
    ports: [ "8010:8010" ]

  indexer:
    build: ../services/indexer
    environment:
      - "MEILI_URL=${MEILI_URL}"
      - "MEILI_MASTER_KEY=${MEILI_MASTER_KEY}"
      - "REDIS_URL=${REDIS_URL}"
    depends_on: [ meilisearch, redis ]

  ocr-worker:
    build: ../services/ocr-worker
    volumes: [ "shared:/shared" ]

  # infra
  redis: { image: redis:7-alpine, ports: [ "6379:6379" ] }
  meilisearch:
    image: getmeili/meilisearch:v1.10
    environment: [ "MEILI_MASTER_KEY=${MEILI_MASTER_KEY}" ]
    ports: [ "7700:7700" ]
  prometheus:
    image: prom/prometheus:v2.55.1
    volumes: [ "./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml" ]
    ports: [ "9090:9090" ]
  grafana:
    image: grafana/grafana:11.2.0
    environment: [ "GF_SECURITY_ADMIN_PASSWORD=admin" ]
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/dashboards:/etc/grafana/dashboards
    ports: [ "3001:3000" ]

  loki:
    image: grafana/loki:2.9.8
    command: -config.file=/etc/loki/loki-config.yml
    volumes: [ "./loki/loki-config.yml:/etc/loki/loki-config.yml" ]
    ports: [ "3100:3100" ]

  promtail:
    image: grafana/promtail:2.9.8
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - "./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml"
      - "/var/lib/docker/containers:/var/lib/docker/containers:ro"
    depends_on: [ loki ]

  # Keycloak (SSO)
  keycloak:
    image: quay.io/keycloak/keycloak:25.0.4
    command: [ "start-dev", "--import-realm" ]
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json

  # MinIO (S3 compatible)
  minio:
    image: minio/minio:RELEASE.2025-02-18T18-00-00Z
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes: [ "minio_data:/data" ]
    ports: [ "9000:9000","9001:9001" ]

  # TURN
  coturn:
    image: coturn/coturn:latest
    network_mode: host
    volumes: [ "./turn/turnserver.conf:/etc/turnserver.conf" ]
    command: ["-c","/etc/turnserver.conf"]

volumes:
  drive_store: {}
  minio_data: {}
  shared: {}
