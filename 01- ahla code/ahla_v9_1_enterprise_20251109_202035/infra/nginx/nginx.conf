events {}
http {
  server {
    listen 80;
    server_name _;

    # web apps
    location /chat/ { proxy_pass http://chat-web:3000/; proxy_set_header Host $host; }
    location /meet/ { proxy_pass http://meet-web:3000/; proxy_set_header Host $host; }
    location /drive/ { proxy_pass http://drive-web:3000/; proxy_set_header Host $host; }
    location /biz/  { proxy_pass http://business-web:3000/; proxy_set_header Host $host; }
    location /omni/ { proxy_pass http://omni-web:3000/; proxy_set_header Host $host; }
    location /mail/ { proxy_pass http://mail-web:3000/; proxy_set_header Host $host; }

    # apis
    location /api/chat/ { proxy_pass http://chat-api:8000/; }
    location /api/meet/ { proxy_pass http://meet-api:8020/; }
    location /api/drive/ { proxy_pass http://drive-api:8030/; }
    location /api/biz/ { proxy_pass http://business-api:8040/; }
    location /api/mail/ { proxy_pass http://mail-api:8050/; }
    location /api/omni/ { proxy_pass http://omni-gateway:8060/; }

    # ws
    location /ws {
      proxy_pass http://chat-ws:8080/ws;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "Upgrade";
      proxy_set_header Host $host;
    }
    location /signal {
      proxy_pass http://meet-ws:8090/signal;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "Upgrade";
      proxy_set_header Host $host;
    }
  }
}
