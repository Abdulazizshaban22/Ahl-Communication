
events {}
http {
  server {
    listen 80;
    server_name _;
    add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' data: blob:; connect-src 'self' ws: wss:; img-src 'self' data: blob;";
    location /chat/      { proxy_pass http://chat-web:3000/; }
    location /meet/      { proxy_pass http://meet-web:3100/; }
    location /drive/     { proxy_pass http://drive-web:3300/; }
    location /business/  { proxy_pass http://business-web:3400/; }
    location /mail/      { proxy_pass http://mail-web:3200/; }

    location /api/chat/     { proxy_pass http://chat-api:8000/; }
    location /api/meet/     { proxy_pass http://meet-api:8100/; }
    location /api/drive/    { proxy_pass http://drive-api:8200/; }
    location /api/business/ { proxy_pass http://business-api:8250/; }
    location /api/mail/     { proxy_pass http://mail-api:8300/; }
    location /api/emotion/  { proxy_pass http://emotion-engine:8400/; }

    location /push/sendTo   { proxy_pass http://push-worker:8787/sendTo; }
  }
}
