apiVersion: v1
kind: Service
metadata:
  name: {{ include "ahla-chat-api.fullname" . }}
  labels:
{{ include "ahla-chat-api.labels" . | indent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "ahla-chat-api.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: 80
      targetPort: {{ .Values.service.port }}
