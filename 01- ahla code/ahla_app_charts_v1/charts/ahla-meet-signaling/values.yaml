replicas: 2
image:
  repository: ${{ env.ECR_REGISTRY }}/ahla/meet-signaling
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  port: 8082

env:
  LOG_LEVEL: info

resources:
  requests: { cpu: "200m", memory: "256Mi" }
  limits: { cpu: "1", memory: "1Gi" }

readiness:
  path: /healthz
liveness:
  path: /healthz

ingress:
  enabled: true
  host: meet.ahla.com
  tlsSecret: meet-ahla-com-tls

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
