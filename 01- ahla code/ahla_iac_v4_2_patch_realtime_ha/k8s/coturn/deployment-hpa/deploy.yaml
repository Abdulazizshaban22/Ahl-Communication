apiVersion: apps/v1
kind: Deployment
metadata:
  name: coturn
  namespace: ahla-system
  labels: { app: coturn, tier: rtc }
spec:
  replicas: 2
  selector: { matchLabels: { app: coturn } }
  template:
    metadata:
      labels: { app: coturn }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9641"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: coturn
        image: coturn/coturn:latest
        args: ["-c","/etc/turnserver.conf"]
        ports:
        - { name: turn-udp, containerPort: 3478, protocol: UDP }
        - { name: turn-tcp, containerPort: 3478, protocol: TCP }
        - { name: turn-tls, containerPort: 443,  protocol: TCP }
        - { name: metrics,  containerPort: 9641, protocol: TCP }
        volumeMounts:
        - { name: cfg, mountPath: /etc }
        resources:
          requests: { cpu: "200m", memory: "256Mi" }
          limits:   { cpu: "1000m", memory: "1Gi" }
      volumes:
      - name: cfg
        configMap: { name: coturn-config }
---
apiVersion: v1
kind: Service
metadata:
  name: coturn-nlb
  namespace: ahla-system
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
    service.beta.kubernetes.io/aws-load-balancer-target-group-attributes: "proxy_protocol_v2.enabled=true"
spec:
  type: LoadBalancer
  externalTrafficPolicy: Cluster
  selector: { app: coturn }
  ports:
  - { name: turn-udp, port: 3478, targetPort: 3478, protocol: UDP }
  - { name: turn-tcp, port: 3478, targetPort: 3478, protocol: TCP }
  - { name: turn-tls, port: 443,  targetPort: 443,  protocol: TCP }
