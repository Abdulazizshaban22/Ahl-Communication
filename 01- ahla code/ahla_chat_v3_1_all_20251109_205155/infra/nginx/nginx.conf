events {}
http {
  server {
    listen 80;
    server_name _;

    add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' data: blob:; connect-src 'self' ws: wss:; img-src 'self' data: blob;";

    # PWA
    location = /chat/sw.js { alias /app/apps/chat-web/public/sw.js; }
    location = /chat/manifest.json { alias /app/apps/chat-web/public/manifest.json; }
    location /chat/whisper/ { alias /app/apps/chat-web/public/whisper/; autoindex on; }

    # Web
    location /chat/ { proxy_pass http://chat-web:3000/; proxy_set_header Host $host; }

    # APIs
    location /api/chat/ { proxy_pass http://chat-api:8000/; }
    location /api/moments/ { proxy_pass http://moments-api:8010/; }
    location /api/emotion/ { proxy_pass http://emotion-api:8020/; }

    # Push worker direct (optional)
    location /push/sendTo { proxy_pass http://push-worker:8787/sendTo; }
  }
}