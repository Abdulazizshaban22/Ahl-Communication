name: Build & Push (ECR)
on:
  workflow_dispatch:
    inputs:
      tag:
        required: true
        type: string
        default: "v9.2"
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: me-central-1
      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build & Push (reverse-proxy)
        env:
          REPO: ${{ steps.ecr.outputs.registry }}/ahla/reverse-proxy
          TAG:  ${{ github.event.inputs.tag }}
        run: |
          # مثال: استخدم Dockerfile خاص بـ Nginx من مشروعك
          echo 'FROM nginx:1.27-alpine
COPY infra/nginx/nginx.conf /etc/nginx/nginx.conf' > Dockerfile
          docker build -t $REPO:$TAG .
          docker push $REPO:$TAG