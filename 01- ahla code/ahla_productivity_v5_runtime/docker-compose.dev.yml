version: "3.9"
services:
  collab:
    build: ./services/collab-gateway
    environment:
      - PORT=1234
    ports: ["1234:1234"]
  contentapi:
    build: ./services/content-api
    environment:
      - DATABASE_URL=sqlite:////data/content.db
    volumes:
      - contentdb:/data
    ports: ["8001:8001"]
  superset:
    image: apache/superset:latest
    environment:
      - SUPERSET_SECRET_KEY=ahla-secret
    ports: ["8088:8088"]
volumes:
  contentdb: {}
