services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ahla
      POSTGRES_PASSWORD: ahla
      POSTGRES_DB: ahla
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U ahla"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7
    ports: ["6379:6379"]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
    volumes: ["minio:/data"]

  onlyoffice:
    image: onlyoffice/documentserver
    environment:
      JWT_ENABLED: "true"
      JWT_SECRET: ${ONLYOFFICE_JWT_SECRET}
    ports: ["8082:80"]

  chat-ws:
    build: ../services/chat-ws
    ports: ["8090:8090"]

  nginx:
    image: nginx:alpine
    volumes:
      - "./nginx.conf:/etc/nginx/nginx.conf:ro"
    ports: ["80:80"]
    depends_on: [ chat-ws ]

volumes:
  minio: {}
