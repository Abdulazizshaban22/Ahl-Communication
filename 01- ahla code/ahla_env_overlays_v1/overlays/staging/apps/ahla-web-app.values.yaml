replicas: 1
image:
  repository: ${{ env.ECR_REGISTRY }}/ahla/ahla-web-app
  tag: ${{ github.sha }}
  pullPolicy: IfNotPresent

service:
  port: 80

env:
  LOG_LEVEL: info

resources:
  requests: { cpu: "300m", memory: "512Mi" }
  limits:   { cpu: "2", memory: "2Gi" }

readiness: { path: /healthz }
liveness:  { path: /healthz }

ingress:
  enabled: true
  host: apps.stg.ahla.com
  tlsSecret: apps-stg-ahla-com-tls

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 65

serviceMonitor:
  enabled: true
  interval: 30s
