replicas: 1
image:
  repository: ${{ env.ECR_REGISTRY }}/ahla/ahla-search-service
  tag: ${{ github.sha }}
  pullPolicy: IfNotPresent

service:
  port: 8091

env:
  LOG_LEVEL: info
  DATABASE_URL: "postgresql://ahla:***@aurora-endpoint:5432/ahladb"

resources:
  requests: { cpu: "300m", memory: "512Mi" }
  limits:   { cpu: "2", memory: "2Gi" }

readiness: { path: /healthz }
liveness:  { path: /healthz }

ingress:
  enabled: true
  host: search.stg.ahla.com
  tlsSecret: search-stg-ahla-com-tls

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 65

serviceMonitor:
  enabled: true
  interval: 30s
