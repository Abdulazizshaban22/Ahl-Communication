replicas: 3
image:
  repository: ${{ env.ECR_REGISTRY }}/ahla/ahla-search-service
  tag: ${{ github.sha }}
  pullPolicy: IfNotPresent

service:
  port: 8091

env:
  LOG_LEVEL: info
  DATABASE_URL: "postgresql://ahla:***@aurora-endpoint:5432/ahladb"

resources:
  requests: { cpu: "800m", memory: "1Gi" }
  limits:   { cpu: "4", memory: "8Gi" }

readiness: { path: /healthz }
liveness:  { path: /healthz }

ingress:
  enabled: true
  host: search.ahla.com
  tlsSecret: search-ahla-com-tls

hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70

serviceMonitor:
  enabled: true
  interval: 30s
