apiVersion: apps/v1
kind: Deployment
metadata: { name: dash, labels: { app: dash } }
spec:
  replicas: 2
  selector: { matchLabels: { app: dash } }
  template:
    metadata:
      labels: { app: dash }
    spec:
      containers:
      - name: dash
        image: {{ .Values.images.dash }}
        ports: [{{{{ name: http, containerPort: 3000 }}}}]
        env:
        - name: NEXTAUTH_URL
          value: "https://{{ .Values.hosts.dash }}"
        - name: NEXTAUTH_SECRET
          valueFrom: {{ '{{' }} secretKeyRef: {{ '}}' }}
        - name: AUTH_KEYCLOAK_ISSUER
          value: "{{ .Values.global.auth.issuer }}"
        - name: AUTH_KEYCLOAK_CLIENT_ID
          value: "{{ .Values.global.auth.clientId }}"
        - name: AUTH_KEYCLOAK_CLIENT_SECRET
          valueFrom: {{ '{{' }} secretKeyRef: {{ '}}' }}
        - name: NEXT_PUBLIC_NATS_WS_URL
          value: "{{ .Values.global.natsWS }}"
        - name: NEXT_PUBLIC_CONTENT_API
          value: "{{ .Values.global.contentApi }}"
---
apiVersion: v1
kind: Service
metadata: { name: dash }
spec:
  selector: { app: dash }
  ports: [{{{{ name: http, port: 80, targetPort: 3000 }}}}]
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dash
  annotations:
    kubernetes.io/tls-acme: "true"
    cert-manager.io/cluster-issuer: "{{ .Values.global.ingress.clusterIssuer }}"
spec:
  ingressClassName: "{{ .Values.global.ingress.className }}"
  tls:
  - hosts: ["{{ .Values.hosts.dash }}"]
    secretName: dash-tls
  rules:
  - host: "{{ .Values.hosts.dash }}"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service: { name: dash, port: { number: 80 } }
