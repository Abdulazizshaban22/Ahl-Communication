
events {}
http {
  server {
    listen 80;
    server_name _;

    add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' data: blob:; connect-src 'self' ws: wss:; img-src 'self' data: blob;";

    # PWAs
    location = /chat/manifest.json { alias /app/apps/chat-web/public/manifest.json; }
    location = /chat/sw.js { alias /app/apps/chat-web/public/sw.js; }
    location = /meet/manifest.json { alias /app/apps/meet-web/public/manifest.json; }
    location = /meet/sw.js { alias /app/apps/meet-web/public/sw.js; }
    location = /drive/manifest.json { alias /app/apps/drive-web/public/manifest.json; }
    location = /drive/sw.js { alias /app/apps/drive-web/public/sw.js; }
    location = /business/manifest.json { alias /app/apps/business-web/public/manifest.json; }
    location = /business/sw.js { alias /app/apps/business-web/public/sw.js; }

    # Web apps
    location /chat/     { proxy_pass http://chat-web:3000/; }
    location /meet/     { proxy_pass http://meet-web:3100/; }
    location /drive/    { proxy_pass http://drive-web:3200/; }
    location /business/ { proxy_pass http://business-web:3300/; }

    # APIs
    location /api/chat/     { proxy_pass http://chat-api:8000/; }
    location /api/meet/     { proxy_pass http://meet-api:8100/; }
    location /api/drive/    { proxy_pass http://drive-api:8200/; }
    location /api/business/ { proxy_pass http://business-api:8300/; }
    location /api/emotion/  { proxy_pass http://emotion-engine:8400/; }

    # Push
    location /push/sendTo { proxy_pass http://push-worker:8787/sendTo; }
  }
}
