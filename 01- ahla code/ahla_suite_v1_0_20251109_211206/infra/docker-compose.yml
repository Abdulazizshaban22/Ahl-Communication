
version: "3.9"
services:
  reverse-proxy:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../apps/chat-web/public:/app/apps/chat-web/public:ro
      - ../apps/meet-web/public:/app/apps/meet-web/public:ro
      - ../apps/drive-web/public:/app/apps/drive-web/public:ro
      - ../apps/business-web/public:/app/apps/business-web/public:ro
    ports: [ "8080:80" ]
    depends_on: [ chat-web, meet-web, drive-web, business-web, chat-api, meet-api, drive-api, business-api, emotion-engine, push-worker, redis, prometheus, grafana ]

  chat-web:
    build: ../apps/chat-web

  meet-web:
    build: ../apps/meet-web

  drive-web:
    build: ../apps/drive-web

  business-web:
    build: ../apps/business-web

  chat-api:
    build: ../services/chat-api
    environment: [ "REDIS_URL=redis://redis:6379/0", "ATTACH_STORE=/data" ]
    volumes: [ "chat_data:/data" ]
    ports: [ "8000:8000" ]

  meet-api:
    build: ../services/meet-api
    ports: [ "8100:8100" ]

  drive-api:
    build: ../services/drive-api
    environment: [ "DRIVE_STORE=/data" ]
    volumes: [ "drive_data:/data" ]
    ports: [ "8200:8200" ]

  business-api:
    build: ../services/business-api
    ports: [ "8300:8300" ]

  emotion-engine:
    build: ../services/emotion-engine
    ports: [ "8400:8400" ]

  push-worker:
    build: ../services/push-worker
    environment:
      - REDIS_URL=redis://redis:6379/0
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
    ports: [ "8787:8787" ]

  redis:
    image: redis:7-alpine
    ports: [ "6379:6379" ]

  prometheus:
    image: prom/prometheus:v2.55.1
    volumes: [ "../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro" ]
    ports: [ "9090:9090" ]

  grafana:
    image: grafana/grafana:11.2.0
    environment: [ "GF_SECURITY_ADMIN_PASSWORD=admin" ]
    ports: [ "3001:3000" ]
    volumes:
      - ../monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ../monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../monitoring/grafana/dashboards:/etc/grafana/dashboards:ro

volumes: { chat_data: {}, drive_data: {} }
