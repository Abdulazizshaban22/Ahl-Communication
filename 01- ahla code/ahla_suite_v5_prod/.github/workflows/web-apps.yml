name: Build web apps
on:
  push: { branches: [ main ] }
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix: { app: [ahla-drive,ahla-meet,ahla-notes,ahla-book,ahla-graph,ahla-dote,ahla-dash] }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '18' }
      - run: cd apps/${{ matrix.app }} && npm ci && npm run build
