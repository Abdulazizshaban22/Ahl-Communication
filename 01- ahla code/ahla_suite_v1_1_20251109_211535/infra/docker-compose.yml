
version: "3.9"
services:
  reverse-proxy:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports: [ "8080:80" ]
    depends_on: [ chat-web, meet-web, chat-api, meet-api, push-worker, redis ]

  chat-web:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm i && npm run dev"
    volumes: [ "../apps/chat-web:/app" ]
    environment:
      - NEXT_TELEMETRY_DISABLED=1

  meet-web:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm i && npm run dev"
    volumes: [ "../apps/meet-web:/app" ]
    environment: [ "NEXT_TELEMETRY_DISABLED=1" ]

  chat-api:
    image: python:3.11-alpine
    working_dir: /app
    command: sh -c "pip install fastapi uvicorn[standard] redis python-multipart prometheus-client && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment: [ "REDIS_URL=redis://redis:6379/0", "ATTACH_STORE=/data" ]
    volumes: [ "../services/chat-api/app:/app/app", "chat_data:/data" ]
    ports: [ "8000:8000" ]

  meet-api:
    image: python:3.11-alpine
    working_dir: /app
    command: sh -c "pip install fastapi uvicorn[standard] prometheus-client && uvicorn app.main:app --host 0.0.0.0 --port 8100"
    environment:
      - STUN_URL=stun:stun.l.google.com:19302
      - TURN_URL=turn:localhost:3478
      - TURN_USER=ahla
      - TURN_PASS=ahla123
    volumes: [ "../services/meet-api/app:/app/app" ]
    ports: [ "8100:8100" ]

  push-worker:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm i && node src/server.js"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
    volumes: [ "../services/push-worker:/app" ]
    ports: [ "8787:8787" ]

  redis:
    image: redis:7-alpine
    ports: [ "6379:6379" ]

  coturn:
    image: coturn/coturn:latest
    network_mode: host
    volumes: [ "./turn/turnserver.conf:/etc/turnserver.conf:ro" ]
    command: [ "-c", "/etc/turnserver.conf" ]
    # ملاحظة: network_mode:host لتبسيط UDP لاختبارات محلية

volumes: { chat_data: {} }
