
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mobile-gateway.fullname" . }}
  labels: {{- include "mobile-gateway.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels: {{- include "mobile-gateway.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "mobile-gateway.selectorLabels" . | nindent 8 }}
    spec:
      containers:
      - name: gateway
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        env:
        {{- range $k, $v in .Values.env }}
        - name: {{ $k }}
          value: "{{ $v }}"
        {{- end }}
        ports:
        - name: http
          containerPort: 8080
        readinessProbe:
          httpGet: { path: /healthz, port: 8080 }
          initialDelaySeconds: 5
        livenessProbe:
          httpGet: { path: /healthz, port: 8080 }
          initialDelaySeconds: 10
        resources: {{- toYaml .Values.resources | nindent 10 }}
