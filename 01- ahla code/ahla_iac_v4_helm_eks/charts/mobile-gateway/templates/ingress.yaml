
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "mobile-gateway.fullname" . }}
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-http01
spec:
  ingressClassName: {{ .Values.ingress.className | quote }}
  tls:
  - hosts:
    {{- range .Values.ingress.hosts }}
      - {{ . | quote }}
    {{- end }}
    secretName: {{ include "mobile-gateway.fullname" . }}-tls
  rules:
  {{- range .Values.ingress.hosts }}
  - host: {{ . | quote }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ include "mobile-gateway.fullname" $ }}
            port: { number: 80 }
  {{- end }}
{{- end }}
