
replicaCount: 2
image:
  repository: ghcr.io/ahla/mobile-gateway
  tag: latest
  pullPolicy: IfNotPresent

env: {}
service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: nginx
  hosts: []
  tls:
    enabled: true

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
