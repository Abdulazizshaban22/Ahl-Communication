# إضافات أمان: HSTS + CSP + منع XSS/Clickjacking
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
# مثال CSP عام (عدّل النطاقات حسب واقعك):
add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; media-src 'self' blob:; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' https:;" always;
