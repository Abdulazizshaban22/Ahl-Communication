apiVersion: v1
kind: ConfigMap
metadata: { name: nats-config, namespace: ahla-system }
data:
  nats.conf: |
    jetstream: { store_dir: "/data/js" }
    server_name: "ahla-nats"
    http: 8222
    cluster { name: "ahla-js"; port: 6222 }
    websocket {
      port: {{ .Values.nats.wsPort | default 9222 }}
      no_tls: true
      same_origin: false
      allowed_origins: [{{- range $i, $o := .Values.nats.allowedOrigins }}{{ if $i }}, {{ end }}"{{ $o }}"{{- end }}]
    }
    authorization {
      users = [
        { user: "{{ .Values.nats.auth.user }}", password: "{{ .Values.nats.auth.password }}",
          permissions: {
            publish = ["chat.*.send", "presence.*", "notify.*", "doc.*.edit"],
            subscribe = ["chat.>", "presence.>", "notify.>", "doc.>"]
          }
        }
      ]
    }
---
apiVersion: apps/v1
kind: StatefulSet
metadata: { name: nats, namespace: ahla-system, labels: { app: nats } }
spec:
  replicas: {{ .Values.nats.replicas | default 3 }}
  serviceName: nats-headless
  selector: { matchLabels: { app: nats } }
  template:
    metadata:
      labels: { app: nats }
    spec:
      containers:
      - name: nats
        image: nats:2.10
        args: ["-c","/etc/nats/nats.conf","--jetstream"]
        ports:
        - { name: client,  containerPort: 4222 }
        - { name: cluster, containerPort: 6222 }
        - { name: monitor, containerPort: 8222 }
        - { name: ws,      containerPort: {{ .Values.nats.wsPort | default 9222 }} }
        volumeMounts:
        - { name: cfg,  mountPath: /etc/nats }
        - { name: data, mountPath: /data }
      volumes:
      - name: cfg
        configMap: { name: nats-config }
  volumeClaimTemplates:
  - metadata: { name: data }
    spec:
      accessModes: ["ReadWriteOnce"]
      resources: { requests: { storage: 50Gi } }
---
apiVersion: v1
kind: Service
metadata: { name: nats-headless, namespace: ahla-system }
spec:
  clusterIP: None
  selector: { app: nats }
  ports:
  - { name: client,  port: 4222, targetPort: 4222 }
  - { name: cluster, port: 6222, targetPort: 6222 }
  - { name: monitor, port: 8222, targetPort: 8222 }
  - { name: ws,      port: {{ .Values.nats.wsPort | default 9222 }}, targetPort: {{ .Values.nats.wsPort | default 9222 }} }
