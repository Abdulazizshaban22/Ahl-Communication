# /etc/coturn/turnserver.conf

# Listening
listening-port=3478
# External/Public IP (uncomment and set if behind NAT):
# external-ip=203.0.113.10

# Authentication: Long-term credentials
lt-cred-mech
user=ahla:ahla123
realm=ahla.turn

# Relay ports
min-port=49152
max-port=49999

# Fingerprints and RFC5766 defaults
fingerprint
stale-nonce=600

# No TLS in this minimal example (enable in production)
no-tls
no-dtls

# Verbose for first runs; reduce later
verbose