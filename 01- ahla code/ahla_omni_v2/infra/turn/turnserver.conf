# Production sample: CoTURN on 443/TLS
listening-port=3478
tls-listening-port=443
realm=meet.ahla.com
# Certificates from Let's Encrypt:
cert=/etc/letsencrypt/live/meet.ahla.com/fullchain.pem
pkey=/etc/letsencrypt/live/meet.ahla.com/privkey.pem
fingerprint
lt-cred-mech
user=ahla:REPLACE_STRONG_PASSWORD
# For privileged ports (<1024) ensure service has CAP_NET_BIND_SERVICE or runs as root.
no-udp
no-tcp-relay
cipher-list=TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384
