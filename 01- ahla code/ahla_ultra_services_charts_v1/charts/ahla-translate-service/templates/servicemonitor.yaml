{- if .Values.serviceMonitor.enabled }
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: { include "ahla-translate-service.fullname" . }
  labels:
    release: monitoring
{ include "ahla-translate-service.labels" . | indent 4 }
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: { include "ahla-translate-service.name" . }
      app.kubernetes.io/instance: { .Release.Name }
  endpoints:
    - port: http
      path: /metrics
      interval: {{ .Values.serviceMonitor.interval }}
{- end }
