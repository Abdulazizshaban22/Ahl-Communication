replicas: 2
image:
  repository: ${{ env.ECR_REGISTRY }}/ahla/ahla-asr-service
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  port: 8088

env:
  LOG_LEVEL: info

resources:
  requests: { cpu: "300m", memory: "512Mi" }
  limits:   { cpu: "2",    memory: "2Gi" }

readiness: { path: /healthz }
liveness:  { path: /healthz }

ingress:
  enabled: true
  host: asr.ahla.com
  tlsSecret: asr-ahla-com-tls

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

serviceMonitor:
  enabled: true
  interval: 30s
