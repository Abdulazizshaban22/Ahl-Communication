replicaCount: 3
service:
  type: LoadBalancer
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "ip"
    service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "5349"
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "TLS"
  ports:
    - name: turn-tls
      port: 5349
      targetPort: 5349
env:
  - name: REALM
    value: "ahla.com"
args:
  - "--lt-cred-mech"
  - "--min-port=49160"
  - "--max-port=49200"
  - "--fingerprint"
  - "--realm=$(REALM)"
  - "--tls-listening-port=5349"
  - "--cipher-list=TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA256"
  - "--no-cli"
  - "--no-tcp-relay"
  - "--no-udp" # غيّرها حسب حاجتك
volumeMounts:
  - name: certs
    mountPath: /certs
volumes:
  - name: certs
    secret:
      secretName: coturn-tls
