apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ahla-web
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:REGION:ACCOUNT:certificate/CHANGE_ME
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts: ["apps.ahla.com"]
      secretName: apps-ahla-tls
  rules:
    - host: apps.ahla.com
      http:
        paths:
          - path: /drive
            pathType: Prefix
            backend:
              service:
                name: ahla-drive-svc
                port: { number: 80 }
          - path: /meet
            pathType: Prefix
            backend:
              service:
                name: ahla-meet-svc
                port: { number: 80 }
