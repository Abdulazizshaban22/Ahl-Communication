services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.7
    command: >-
      redpanda start --overprovisioned --smp 1 --memory 1G --reserve-memory 0M
      --node-id 0 --check=false --kafka-addr 0.0.0.0:9092 --advertise-kafka-addr redpanda:9092
    ports: ["9092:9092"]

  aif-asr-proxy:
    build: ./aif/services/asr_proxy
    env_file: .env
    ports: ["8081:8081"]
    depends_on: [ redpanda ]

  aif-kafka-demo:
    build: ./aif/orchestrator
    env_file: .env
    command: ["python","demo_topics.py"]
    depends_on: [ redpanda ]
