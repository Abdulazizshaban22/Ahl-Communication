version: "3.9"
services:
  reverse-proxy:
    image: nginx:1.27-alpine
    volumes: [ "./nginx/nginx.conf:/etc/nginx/nginx.conf:ro" ]
    ports: [ "8089:80" ]
    depends_on: [ chat-web, chat-api, chat-ws ]

  chat-web:
    build: ../apps/chat-web

  chat-api:
    build: ../services/chat-api
    environment: [ "REDIS_URL=redis://redis:6379/0", "ATTACH_STORE=/data" ]
    volumes: [ "chat_data:/data" ]
    ports: [ "8000:8000" ]

  chat-ws:
    build: ../services/chat-ws
    environment: [ "WS_PORT=8080" ]
    ports: [ "8080:8080" ]

  redis:
    image: redis:7-alpine
    ports: [ "6379:6379" ]

volumes:
  chat_data: {}