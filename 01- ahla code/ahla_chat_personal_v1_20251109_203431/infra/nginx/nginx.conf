events {}
http {
  server {
    listen 80;
    server_name _;

    location /chat/ { proxy_pass http://chat-web:3000/; proxy_set_header Host $host; }
    location /api/chat/ { proxy_pass http://chat-api:8000/; }
    location /ws {
      proxy_pass http://chat-ws:8080/ws;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "Upgrade";
      proxy_set_header Host $host;
    }
  }
}