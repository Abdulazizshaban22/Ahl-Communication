apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-service
  labels: { app: search-service }
spec:
  replicas: 2
  selector: { matchLabels: { app: search-service } }
  template:
    metadata: { labels: { app: search-service } }
    spec:
      containers:
        - name: app
          image: <REG>/ahla/search-service:ultra
          ports: [{ containerPort: 8091 }]
          readinessProbe: { httpGet: { path: /healthz, port: 8091 }, initialDelaySeconds: 5, periodSeconds: 5 }
          livenessProbe:  { httpGet: { path: /healthz, port: 8091 }, initialDelaySeconds: 10, periodSeconds: 10 }
---
apiVersion: v1
kind: Service
metadata:
  name: search-service
spec:
  selector: { app: search-service }
  ports: [{ name: http, port: 80, targetPort: 8091 }]
