apiVersion: apps/v1
kind: Deployment
metadata:
  name: translate-service
  labels: { app: translate-service }
spec:
  replicas: 2
  selector: { matchLabels: { app: translate-service } }
  template:
    metadata: { labels: { app: translate-service } }
    spec:
      containers:
        - name: app
          image: <REG>/ahla/translate-service:ultra
          ports: [{ containerPort: 8089 }]
          readinessProbe: { httpGet: { path: /healthz, port: 8089 }, initialDelaySeconds: 5, periodSeconds: 5 }
          livenessProbe:  { httpGet: { path: /healthz, port: 8089 }, initialDelaySeconds: 10, periodSeconds: 10 }
---
apiVersion: v1
kind: Service
metadata:
  name: translate-service
spec:
  selector: { app: translate-service }
  ports: [{ name: http, port: 80, targetPort: 8089 }]
