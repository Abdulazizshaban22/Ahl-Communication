apiVersion: apps/v1
kind: Deployment
metadata:
  name: asr-service
  labels: { app: asr-service }
spec:
  replicas: 2
  selector: { matchLabels: { app: asr-service } }
  template:
    metadata: { labels: { app: asr-service } }
    spec:
      containers:
        - name: app
          image: <REG>/ahla/asr-service:ultra
          ports: [{ containerPort: 8088 }]
          readinessProbe: { httpGet: { path: /healthz, port: 8088 }, initialDelaySeconds: 5, periodSeconds: 5 }
          livenessProbe:  { httpGet: { path: /healthz, port: 8088 }, initialDelaySeconds: 10, periodSeconds: 10 }
---
apiVersion: v1
kind: Service
metadata:
  name: asr-service
spec:
  selector: { app: asr-service }
  ports: [{ name: http, port: 80, targetPort: 8088 }]
