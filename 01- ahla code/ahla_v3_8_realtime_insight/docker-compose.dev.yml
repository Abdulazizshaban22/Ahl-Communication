services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.7
    command: >-
      redpanda start --overprovisioned --smp 1 --memory 1G --reserve-memory 0M
      --node-id 0 --check=false --kafka-addr 0.0.0.0:9092 --advertise-kafka-addr redpanda:9092
    ports: ["9092:9092"]

  insight-gateway:
    build: ./services/insight-gateway
    env_file: .env
    ports: ["8085:8085"]
    depends_on: [ redpanda ]

  insight-dashboard-next:
    build: ./apps/insight-dashboard-next
    env_file: .env
    ports: ["3008:3000"]
    depends_on: [ insight-gateway ]
