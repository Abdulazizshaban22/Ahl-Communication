name: ci
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build web
        working-directory: apps/web
        run: |
          npm i
          npm run build
      - name: Lint web
        working-directory: apps/web
        run: npm run lint || true
      - name: API deps
        working-directory: services/chat-api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
