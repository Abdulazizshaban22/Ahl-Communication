events { }
http {
  server {
    listen 80;
    server_name _;
    # Web (Next.js)
    location / {
      proxy_pass http://web:3000;
      proxy_set_header Host $host;
      proxy_http_version 1.1;
    }
    # API
    location /api/ {
      proxy_pass http://chat-api:8000/;
      proxy_set_header Host $host;
    }
    # Emotion
    location /emotion/ {
      proxy_pass http://emotion-engine:8010/;
      proxy_set_header Host $host;
    }
    # WebSockets
    location /ws {
      proxy_pass http://chat-ws:8080/ws;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "Upgrade";
      proxy_set_header Host $host;
    }
  }
}
