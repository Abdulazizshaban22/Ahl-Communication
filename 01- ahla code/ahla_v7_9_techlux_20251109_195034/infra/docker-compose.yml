version: "3.9"
services:
  reverse-proxy:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${PUBLIC_PORT-8088}:80"
    depends_on: [web, chat-api, chat-ws, emotion-engine]
  web:
    build: ../apps/web
    environment:
      - NEXT_PUBLIC_WS_URL=ws://localhost:${WS_PORT-8080}/ws
      - NEXT_PUBLIC_API_BASE=http://localhost:${API_PORT-8000}
    depends_on: [chat-api, chat-ws]
  chat-ws:
    build: ../services/chat-ws
    environment:
      - WS_PORT=${WS_PORT-8080}
    ports:
      - "${WS_PORT-8080}:8080"
  chat-api:
    build: ../services/chat-api
    environment:
      - REDIS_URL=${REDIS_URL-redis://redis:6379/0}
    ports:
      - "${API_PORT-8000}:8000"
    depends_on: [redis]
  emotion-engine:
    build: ../services/emotion-engine
    ports:
      - "8010:8010"
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
  prometheus:
    image: prom/prometheus:v2.55.1
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
  grafana:
    image: grafana/grafana:11.2.0
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
    ports:
      - "3001:3000"
