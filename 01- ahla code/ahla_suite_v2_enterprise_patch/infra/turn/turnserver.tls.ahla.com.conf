# /etc/turnserver.conf for ahla.com (TLS on 443)
listening-port=3478
tls-listening-port=443
listening-ip=0.0.0.0
relay-ip=0.0.0.0
external-ip=PUBLIC_IP
realm=ahla.com
server-name=turn.ahla.com
fingerprint
no-stdout-log
# Auth
use-auth-secret
static-auth-secret=CHANGE_ME_LONG_RANDOM
# Certificates (from Let's Encrypt)
cert=/etc/letsencrypt/live/turn.ahla.com/fullchain.pem
pkey=/etc/letsencrypt/live/turn.ahla.com/privkey.pem
# TLS options
cipher-list="TLS_AES_256_GCM_SHA384:TLS_AES_128_GCM_SHA256"
dh-file=/etc/ssl/certs/dhparam.pem
no-tcp-relay
# Recommended ports (TCP+UDP high range)
min-port=49152
max-port=65535
