# NGINX example for apps on subdomains
server {
  listen 443 ssl http2;
  server_name chat.ahla.com mail.ahla.com drive.ahla.com meet.ahla.com business.ahla.com;
  ssl_certificate /etc/letsencrypt/live/ahla.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/ahla.com/privkey.pem;
  include /etc/nginx/snippets/ssl-params.conf;

  location / { return 301 https://$host$request_uri; }

  # Examples (split to separate servers in prod)
}
# Example: chat.ahla.com upstream
server {
  listen 443 ssl http2;
  server_name chat.ahla.com;
  ssl_certificate /etc/letsencrypt/live/chat.ahla.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/chat.ahla.com/privkey.pem;

  location / { proxy_pass http://chat-web:3000/; }
}
