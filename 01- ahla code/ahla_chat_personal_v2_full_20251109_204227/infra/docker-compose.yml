version: "3.9"
services:
  reverse-proxy:
    image: nginx:1.27-alpine
    volumes: [ "./nginx/nginx.conf:/etc/nginx/nginx.conf:ro", "../apps/chat-web/public:/app/apps/chat-web/public:ro" ]
    ports: [ "8089:80" ]
    depends_on: [ chat-web, chat-api, chat-ws, push-worker ]

  chat-web:
    build: ../apps/chat-web

  chat-api:
    build: ../services/chat-api
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ATTACH_STORE=/data
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
    volumes: [ "chat_data:/data" ]
    ports: [ "8000:8000" ]

  chat-ws:
    build: ../services/chat-ws
    environment: [ "WS_PORT=8080" ]
    ports: [ "8080:8080" ]

  push-worker:
    build: ../services/push-worker
    environment:
      - REDIS_URL=redis://redis:6379/0
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
    ports: [ "8787:8787" ]

  redis:
    image: redis:7-alpine
    ports: [ "6379:6379" ]

volumes:
  chat_data: {}