name: ahla-scheduled-features-and-drift
on:
  schedule:
    - cron: "0 1 * * *"    # daily materialize (UTC)
    - cron: "30 1 * * *"   # daily drift report
  workflow_dispatch:

jobs:
  feast_materialize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install feast redis pandas pyarrow
      - name: Compute offline parquet
        run: python feast_repo/jobs/compute_chat_metrics.py
      - name: Feast apply
        run: cd feast_repo && feast apply
      - name: Materialize incremental (last 25h)
        run: |
          cd feast_repo
          TS=$(date -u -d "25 hours ago" +"%Y-%m-%dT%H:%M:%SZ")
          feast materialize-incremental $TS

  drift_report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install evidently pandas
      - run: python monitoring/evidently/drift_report.py || echo "No drift inputs yet"
      - uses: actions/upload-artifact@v4
        with: { name: evidently-report, path: monitoring/evidently/report.html }
