version: '3.9'
services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.16.0
    environment:
      - MLFLOW_TRACKING_URI=http://0.0.0.0:5000
    ports: ["5000:5000"]
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db --default-artifact-root /mlflow
    volumes: ["./data:/mlflow"]
