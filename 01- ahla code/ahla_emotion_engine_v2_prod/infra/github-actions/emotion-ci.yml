name: emotion-engine-ci
on:
  push: { branches: ["main"] }
  schedule:
    - cron: "0 2 * * 5"   # weekly retrain (UTC)
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./services/emotion-engine
          push: true
          tags: ghcr.io/${{ github.repository }}/emotion-engine:2.0.0
  autotrain:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install prefect mlflow evidently pandas
      - name: Run autotrain flow
        run: python training/prefect/flow.py
