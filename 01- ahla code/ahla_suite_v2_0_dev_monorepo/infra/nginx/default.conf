server {
  listen 80;
  server_name _;
  client_max_body_size 100M;

  location /ws {
    proxy_pass http://chat:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }

  location /meet/ {
    proxy_pass http://meet-signaling:3001/;
  }

  location /drive/ {
    proxy_pass http://drive-api:3002/;
  }

  location /business/ {
    proxy_pass http://business-api:3003/;
  }

  location /mail/ {
    proxy_pass http://mail-api:3004/;
  }

  location /emotion/ {
    proxy_pass http://emotion-api:8000/;
  }

  location / {
    return 200 "Ahla Reverse Proxy • OK";
    add_header Content-Type text/plain;
  }
}
