name: Build & Push to ECR (monorepo)

on:
  push:
    branches: [ "main" ]
    paths:
      - "apps/**"
      - "services/**"
      - "Dockerfile*"
      - ".github/workflows/ecr.yml"
permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push services (example: insight-gateway)
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          ECR_REPO: ahla/insight-gateway
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG -f services/insight-gateway/Dockerfile .
          docker push $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG