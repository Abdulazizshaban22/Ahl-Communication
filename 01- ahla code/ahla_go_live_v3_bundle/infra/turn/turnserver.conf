# CoTURN TLS/443 production sample
listening-port=3478
tls-listening-port=443
fingerprint
realm=ahla.com
use-auth-secret
static-auth-secret=CHANGE_ME
cert=/etc/letsencrypt/live/meet.ahla.com/fullchain.pem
pkey=/etc/letsencrypt/live/meet.ahla.com/privkey.pem
no-tcp-relay
min-port=49160
max-port=49200
no-loopback-peers
no-multicast-peers
# For corporate firewalls, you may add 'no-udp' to force TCP/TLS only.
