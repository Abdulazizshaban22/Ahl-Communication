name: Build & Push Images

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

env:
  REGISTRY: ${{ secrets.REGISTRY }}

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [notes-web, book-web, graph-web, dote-web, dash-web, content-api, collab-gateway]
    steps:
    - uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
    - name: Set up Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ secrets.REGISTRY_USERNAME }}
        password: ${{ secrets.REGISTRY_PASSWORD }}

    - name: Compute image path
      id: img
      run: |
        echo "NAME=${{ matrix.component }}" >> $GITHUB_OUTPUT
        echo "TAG=${{ github.sha }}" >> $GITHUB_OUTPUT

    - name: Build & Push
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ${{ (matrix.component == 'content-api' && 'services/content-api/Dockerfile') || (matrix.component == 'collab-gateway' && 'services/collab-gateway/Dockerfile') || format('apps/{0}/Dockerfile', matrix.component) }}
        push: true
        tags: ${{ env.REGISTRY }}/ahla/${{ steps.img.outputs.NAME }}:${{ steps.img.outputs.TAG }}
        platforms: linux/amd64
