
name: Deploy

on:
  push:
    branches: [ main ]

concurrency:
  group: production
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}/ahla-web

jobs:
  migrate:
    name: Run Prisma Migrate (deploy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'apps/web/package-lock.json'

      - name: Install deps
        run: npm ci

      - name: Prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          npx prisma migrate deploy
          npx prisma generate

  build-and-push:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    needs: migrate
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set tags
        id: meta
        run: |
          echo "TAG_SHA=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          echo "TAG_DATE=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./apps/web
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.TAG_DATE }}-${{ steps.meta.outputs.TAG_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
