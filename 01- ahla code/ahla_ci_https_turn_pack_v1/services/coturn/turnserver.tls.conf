
# TURN + TURNS production-ish example

# Public IP if behind NAT:
# external-ip=203.0.113.10

realm=ahla.turn

# Listening ports
listening-port=3478
tls-listening-port=5349

# Auth: long-term credentials
lt-cred-mech
user=ahla:change-me-please

# Certificates (PEM)
cert=/etc/letsencrypt/live/turn.your.domain.com/fullchain.pem
pkey=/etc/letsencrypt/live/turn.your.domain.com/privkey.pem

# Modern TLS
no-sslv3
no-tlsv1
# optionally enforce TLS1.2+ only:
# cipher-list=TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA256

# Relay port range (adjust to firewall policy)
min-port=49152
max-port=49999

fingerprint
stale-nonce=600
verbose
