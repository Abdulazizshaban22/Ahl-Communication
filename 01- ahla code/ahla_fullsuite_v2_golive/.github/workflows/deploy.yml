name: Deploy
on: { push: { branches: [ main ] } }
concurrency: { group: production, cancel-in-progress: false }
env: { IMAGE_NAME: ghcr.io/${{ github.repository }}/ahla-web }
jobs:
  migrate:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: apps/web } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: 'apps/web/package-lock.json' }
      - run: npm ci
      - name: Prisma migrate deploy
        env: { DATABASE_URL: ${{ secrets.DATABASE_URL }} }
        run: npx prisma migrate deploy && npx prisma generate
  build-and-push:
    runs-on: ubuntu-latest
    needs: migrate
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with: { registry: ghcr.io, username: ${{ github.actor }}, password: ${{ secrets.GITHUB_TOKEN }} }
      - id: meta
        run: echo "TAG_DATE=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT && echo "TAG_SHA=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
      - uses: docker/build-push-action@v5
        with:
          context: ./apps/web
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.TAG_DATE }}-${{ steps.meta.outputs.TAG_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
