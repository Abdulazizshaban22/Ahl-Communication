events {}
http {
  map $http_upgrade $connection_upgrade { default upgrade; '' close; }
  server { listen 80; server_name your.domain.com; return 301 https://$host$request_uri; }
  server {
    listen 443 ssl http2; server_name your.domain.com;
    ssl_certificate /etc/letsencrypt/live/your.domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your.domain.com/privkey.pem;
    location / { proxy_pass http://web:3000; proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto https; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
    location /ws/chat { proxy_pass http://chat-ws:8090; proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection $connection_upgrade; }
    location /ws/sfu { proxy_pass http://sfu:7000/ws; proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection $connection_upgrade; }
  }
}
