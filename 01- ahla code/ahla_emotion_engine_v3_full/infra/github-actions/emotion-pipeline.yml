name: emotion-pipeline
on:
  push: { branches: ["main"] }
  schedule:
    - cron: "15 2 * * 1"   # Weekly retrain (Mon 02:15 UTC)
    - cron: "0 5 * * *"    # Daily drift report (05:00 UTC)
    - cron: "30 3 1 * *"   # Monthly cleanup (3:30 UTC on 1st)

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./services/emotion-engine
          push: true
          tags: ghcr.io/${{ github.repository }}/emotion-engine:3.0.0

  retrain:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install prefect mlflow evidently pandas feast redis
      - name: Run weekly retrain (Prefect)
        run: python training/prefect/flow.py

  drift-report:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install evidently pandas
      - run: python monitoring/evidently/drift_report.py

  cleanup:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rotate artifacts (placeholder)
        run: echo "Rotate old models/logs (implement policy)"
