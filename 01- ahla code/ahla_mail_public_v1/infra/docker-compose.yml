version: "3.9"
services:
  mail:
    image: stalwartlabs/stalwart:latest
    container_name: ahla-mail
    restart: unless-stopped
    hostname: mail.ahla.com
    environment:
      - STALWART_HOSTNAME=mail.ahla.com
      - STALWART_DOMAINS=ahla.com
    ports:
      - "25:25"      # SMTP
      - "465:465"    # SMTPS
      - "587:587"    # Submission
      - "143:143"    # IMAP
      - "993:993"    # IMAPS
      - "4190:4190"  # ManageSieve
      - "8080:8080"  # Admin UI / JMAP (http)
      - "443:443"    # HTTPS for JMAP / ACME if enabled
    volumes:
      - ./mail-data:/opt/stalwart
    # NOTE: for production consider a reverse proxy (Caddy/Traefik/NGINX) and enable ACME in Stalwart or at the proxy
  mta_sts_web:
    image: nginx:1.27-alpine
    container_name: ahla-mta-sts
    restart: unless-stopped
    volumes:
      - ./web-root:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8088:80"
