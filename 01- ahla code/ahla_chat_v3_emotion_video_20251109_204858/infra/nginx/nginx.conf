events {}
http {
  server {
    listen 80;
    server_name _;

    # Chat APIs
    location /api/chat/ { proxy_pass http://chat-api:8000/; }

    # Moments
    location /api/moments/ { proxy_pass http://moments-api:8010/; }

    # Emotion
    location /api/emotion/ { proxy_pass http://emotion-api:8020/; }

    # Web (v3 demo pages)
    location /chat/ { proxy_pass http://chat-web:3000/; proxy_set_header Host $host; }
  }
}